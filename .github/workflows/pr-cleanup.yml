name: PR Cleanup

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to clean up'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_STATE_BUCKET: stark-tf-state

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Read shared outputs
        id: shared
        working-directory: terraform/shared
        run: |
          terraform init -input=false
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "s3_bucket_arn=$(terraform output -raw s3_bucket_arn)" >> $GITHUB_OUTPUT
          echo "cf_distribution_arn=$(terraform output -raw cloudfront_distribution_arn)" >> $GITHUB_OUTPUT

      - name: Resolve PR number
        id: pr
        run: echo "number=${{ github.event.pull_request.number || inputs.pr_number }}" >> $GITHUB_OUTPUT

      - name: Terraform init – api (PR state)
        working-directory: terraform/api
        run: |
          terraform init -input=false \
            -backend-config="key=family-schedule/api-pr-${{ steps.pr.outputs.number }}.tfstate"

      - name: Terraform destroy – api (PR)
        working-directory: terraform/api
        run: |
          terraform destroy -auto-approve -input=false \
            -var="env_name=pr-${{ steps.pr.outputs.number }}" \
            -var="s3_bucket=${{ steps.shared.outputs.s3_bucket }}" \
            -var="s3_bucket_arn=${{ steps.shared.outputs.s3_bucket_arn }}" \
            -var="s3_key=preview/pr-${{ steps.pr.outputs.number }}/schedule.yaml" \
            -var="cloudfront_distribution_arn=${{ steps.shared.outputs.cf_distribution_arn }}"

      - name: Delete PR state from S3
        run: |
          aws s3 rm \
            "s3://${{ env.TF_STATE_BUCKET }}/family-schedule/api-pr-${{ steps.pr.outputs.number }}.tfstate"

      - name: Delete preview assets from content bucket
        run: |
          aws s3 rm \
            "s3://${{ steps.shared.outputs.s3_bucket }}/preview/pr-${{ steps.pr.outputs.number }}/" \
            --recursive
