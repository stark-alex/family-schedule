      - time: "After work"
        label: Tricia — volleyball
        category: vball
        who: tricia
        flexible: false
        note: Full 2hr session, counts as her cardio for the week. She's out until ~7–7:15.
      - time: "5:00"
        label: Alex — solo parent + cooks
        category: dinner
        who: alex
        flexible: false
        note: Alex covers kids, homework, dinner. Keep it simple — one-adult cook night. Batch cook Tuesday evening or use easy meals.
      - time: "7:15"
        label: Tricia home
        category: rest
        who: tricia
        flexible: false
