# Family Schedule Configuration
# Edit this file to update the schedule, then refresh schedule.html in your browser.
#
# Categories: alex-exercise, tricia-exercise, tennis, walk, major, josie, meals, alex-work, tricia-work
# Bands: morning (workouts + drop-offs) | midday (work) | evening (kids activities + meals + walks)
# Flexible: true = shows a ~ marker, slightly muted (optional plans)
# Who: alex, tricia, both, all (used in notes only, not rendered differently)

days:
  - name: Sunday
    blocks:
      - time: "8:00–9:00"
        label: Peloton spin
        category: alex-exercise
        band: morning
        who: alex
        flexible: true
        note: Sunday morning spin. Cardio only — no logistics pressure, no drop-off needed.
      - time: "3:00–5:00"
        label: Family tennis
        category: tennis
        band: midday
        who: all
        flexible: false
        note: Full exercise session for both Alex and Tricia. Protect this.
      - time: "6:30"
        label: Evening walk
        category: walk
        band: evening
        who: all
        flexible: false
        note: Post-dinner dog walk. Easiest night to lock this in.

  - name: Monday
    blocks:
      - time: "6:50–8:45"
        label: Tricia — gym
        category: tricia-exercise
        band: morning
        who: tricia
        flexible: false
        note: Alex does drop-off at 6:50, freeing Tricia simultaneously.
      - time: "6:50"
        label: Alex drops kids off
        category: major
        band: morning
        who: alex
        flexible: false
      - time: "8:30–4:30"
        label: Work
        category: alex-work
        band: midday
        who: alex
        flexible: false
      - time: "8:00–5:30"
        label: Work
        category: tricia-work
        band: midday
        who: tricia
        flexible: false
