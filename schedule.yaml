        band: evening
        who: all
        flexible: true
        note: Math Club Mondays only. Both kids need pickup at roughly the same time — requires 2 adults. Tricia leaves office ~4:30, or Taylor if available.
      - time: "5:15"
        label: Cook dinner
        category: meals
        band: evening
        who: all
        flexible: false
      - time: "6:30"
        label: Evening walk
        category: walk
        band: evening
        who: all
        flexible: false
        note: Post-dinner family walk. Monday evenings are calm — nothing competing.

