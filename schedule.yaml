      - time: "5:30"
        label: Cook dinner (Tricia)
        category: dinner
        who: tricia
        flexible: false
        note: Tricia cooks Thursday. Alex cooked Wednesday — alternating keeps it fair.
      - time: "7:00"
        label: Evening walk
