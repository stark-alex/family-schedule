<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<!-- js-yaml from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #EEEAE3;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.16);
    --text: #1A1915;
    --text2: #6B6860;
    --text3: #A8A59E;
    --accent: #2D5A27;

    /* Category palette — bg / left-border / text */
    --alex-exercise:  #DDEAF8, #5A9ED0, #1A4070;
    --tricia-exercise:#E8E3F8, #8878C8, #32278A;
    --tennis:         #E2F0D0, #72B040, #285010;
    --walk:           #ECEAE4, #A09888, #484038;
    --major:          #D8F0EE, #48A8A0, #184848;
    --josie:          #FAE0EC, #D05888, #681038;
    --meals:          #F8EFE4, #C09858, #503818;
    --alex-work:      #E8EAEC, #6B7A8D, #2A3040;
    --tricia-work:    #EDEAE6, #8A8278, #3A3530;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border2);
    padding: 1.5rem 2rem 1rem;
    display: flex;
    align-items: flex-end;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.9rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  header p {
    font-size: 12px;
    color: var(--text3);
    margin-top: 5px;
  }

  .view-tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }
  .tab {
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 5px 13px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.12s;
  }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 12px;
    padding: 0.75rem 2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text2);
  }
  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── GRID ── */
  .main { padding: 1.5rem 2rem 3rem; overflow-x: auto; }

  .grid-wrap { min-width: 820px; }

  /* Day header row */
  .day-headers-row { display: flex; margin-bottom: 8px; }
  .band-label-spacer { width: 72px; flex-shrink: 0; }
  .day-headers { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }

  .day-header {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
    padding-bottom: 6px;
    border-bottom: 2px solid var(--border2);
  }

  /* Band rows */
  .band-row {
    display: flex;
    align-items: stretch;
    border-top: 1px solid var(--border);
    padding: 10px 0;
  }
  .band-row.empty { display: none; }

  .band-label {
    width: 72px;
    flex-shrink: 0;
    padding-top: 3px;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
  }

  .band-days {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .day-cell { display: flex; flex-direction: column; gap: 5px; }

  /* ── BLOCK ── */
  .block {
    border-radius: 6px;
    padding: 6px 8px 6px 10px;
    border-left: 3px solid transparent;
    cursor: default;
    position: relative;
    transition: box-shadow 0.12s, transform 0.12s;
  }
  .block:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.10); transform: translateY(-1px); }
  .block.flexible { opacity: 0.68; }
  .block.flexible .block-label::after { content: ' ~'; opacity: 0.5; }

  .block-time  { font-size: 10px; font-weight: 300; opacity: 0.65; margin-bottom: 1px; }
  .block-label { font-size: 11px; font-weight: 500; line-height: 1.35; }
  .block-sub   { font-size: 10px; opacity: 0.65; margin-top: 1px; }

  /* tooltip */
  .block[data-note]:hover::after {
    content: attr(data-note);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0;
    background: var(--text);
    color: var(--bg);
    font-size: 11px;
    font-weight: 300;
    line-height: 1.5;
    padding: 7px 10px;
    border-radius: 6px;
    width: 220px;
    z-index: 100;
    pointer-events: none;
    white-space: normal;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  }

  /* ── CATEGORY COLORS ── */
  .cat-alex-exercise   { background: #DDEAF8; border-left-color: #5A9ED0; color: #1A4070; }
  .cat-tricia-exercise { background: #E8E3F8; border-left-color: #8878C8; color: #32278A; }
  .cat-tennis          { background: #E2F0D0; border-left-color: #72B040; color: #285010; }
  .cat-walk            { background: #ECEAE4; border-left-color: #A09888; color: #484038; }
  .cat-major           { background: #D8F0EE; border-left-color: #48A8A0; color: #184848; }
  .cat-josie           { background: #FAE0EC; border-left-color: #D05888; color: #681038; }
  .cat-meals           { background: #F8EFE4; border-left-color: #C09858; color: #503818; }
  .cat-alex-work       { background: #E8EAEC; border-left-color: #6B7A8D; color: #2A3040; }
  .cat-tricia-work     { background: #EDEAE6; border-left-color: #8A8278; color: #3A3530; }

  /* ── STATS FOOTER ── */
  .stats-bar {
    display: flex;
    gap: 6px;
    padding: 1rem 2rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }
  .stat {
    background: var(--bg);
    border-radius: 7px;
    padding: 8px 14px;
    min-width: 120px;
  }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); }
  .stat-value { font-size: 20px; font-weight: 500; color: var(--text); margin: 2px 0 0; }
  .stat-sub   { font-size: 10px; color: var(--text3); }

  /* ── ERROR / LOADING ── */
  .msg { padding: 3rem 2rem; color: var(--text2); font-size: 13px; }
  .msg code { background: var(--surface2); padding: 2px 6px; border-radius: 3px; font-family: monospace; font-size: 12px; }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Family Schedule</h1>
    <p>Edit <code>schedule.yaml</code> and refresh to update &nbsp;·&nbsp; Hover blocks for notes &nbsp;·&nbsp; <span style="opacity:.6">~ = flexible</span></p>
  </div>
  <div class="view-tabs">
    <button class="tab active" data-view="all">All</button>
    <button class="tab" data-view="exercise">Exercise</button>
    <button class="tab" data-view="kids">Kids</button>
    <button class="tab" data-view="food">Food</button>
  </div>
</header>

<div class="legend" id="legend"></div>

<div class="main">
  <div id="error-msg" class="msg hidden"></div>
  <div class="grid-wrap" id="grid-wrap"></div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// Path to the YAML file (relative to this HTML file)
const YAML_FILE = 'schedule.yaml';

// Time-of-day bands
const BANDS = [
  { key: 'morning', label: 'Morning' },
  { key: 'midday',  label: 'Midday'  },
  { key: 'evening', label: 'Evening' },
];

// Which categories belong to each view filter
const VIEW_CATS = {
  all:      null, // null = show everything
  exercise: ['alex-exercise','tricia-exercise','tennis','walk'],
  kids:     ['major','josie'],
  food:     ['meals'],
};

// Human-readable category labels for the legend
const CAT_LABELS = {
  'alex-exercise':   'Alex — exercise',
  'tricia-exercise': 'Tricia — exercise',
  'tennis':          'Tennis',
  'walk':            'Walk',
  'major':           'Major',
  'josie':           'Josie',
  'meals':           'Meals',
  'alex-work':       'Alex — work',
  'tricia-work':     'Tricia — work',
};

// ── STATE ───────────────────────────────────────────────────────────────────
let scheduleData = null;
let currentView  = 'all';

// ── LOAD YAML ───────────────────────────────────────────────────────────────
async function loadYaml() {
  try {
    const res = await fetch(YAML_FILE + '?_=' + Date.now()); // bust cache
    if (!res.ok) throw new Error(`HTTP ${res.status} — make sure schedule.yaml is in the same folder as this HTML file.`);
    const text = await res.text();
    scheduleData = jsyaml.load(text);
    render();
  } catch (e) {
    showError(e.message);
  }
}

function showError(msg) {
  document.getElementById('error-msg').innerHTML =
    `<strong>Could not load schedule.yaml</strong><br>${msg}<br><br>
     Make sure you're opening this file through a local server, not directly as a <code>file://</code> URL.<br>
     Quick option: <code>python3 -m http.server</code> in this folder, then open <code>http://localhost:8000</code>.`;
  document.getElementById('error-msg').classList.remove('hidden');
  document.getElementById('grid-wrap').classList.add('hidden');
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  if (!scheduleData?.days) return;
  renderLegend();
  renderGrid();
  renderStats();
}

function renderLegend() {
  const seen = new Set();
  (scheduleData.days || []).forEach(d =>
    (d.blocks || []).forEach(b => seen.add(b.category))
  );

  const el = document.getElementById('legend');
  el.innerHTML = '';
  [...seen].forEach(cat => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    // grab the background color from the CSS class via a temp element
    const tmp = document.createElement('div');
    tmp.className = `block cat-${cat}`;
    tmp.style.cssText = 'position:absolute;visibility:hidden;';
    document.body.appendChild(tmp);
    const bg = getComputedStyle(tmp).backgroundColor;
    const border = getComputedStyle(tmp).borderLeftColor;
    document.body.removeChild(tmp);

    item.innerHTML = `<div class="legend-dot" style="background:${bg};outline:1.5px solid ${border};"></div>${CAT_LABELS[cat] || cat}`;
    el.appendChild(item);
  });
}

function renderGrid() {
  const days = scheduleData.days || [];
  const wrap = document.getElementById('grid-wrap');
  wrap.innerHTML = '';

  // Day headers row (with spacer for the band-label column)
  const headersRow = document.createElement('div');
  headersRow.className = 'day-headers-row';
  const spacer = document.createElement('div');
  spacer.className = 'band-label-spacer';
  headersRow.appendChild(spacer);
  const headersGrid = document.createElement('div');
  headersGrid.className = 'day-headers';
  days.forEach(day => {
    const hdr = document.createElement('div');
    hdr.className = 'day-header';
    hdr.textContent = day.name;
    headersGrid.appendChild(hdr);
  });
  headersRow.appendChild(headersGrid);
  wrap.appendChild(headersRow);

  // One band-row per band
  BANDS.forEach(band => {
    const bandRow = document.createElement('div');
    bandRow.className = 'band-row';

    const labelEl = document.createElement('div');
    labelEl.className = 'band-label';
    labelEl.textContent = band.label;
    bandRow.appendChild(labelEl);

    const bandDays = document.createElement('div');
    bandDays.className = 'band-days';

    let totalVisible = 0;

    days.forEach(day => {
      const cell = document.createElement('div');
      cell.className = 'day-cell';

      (day.blocks || [])
        .filter(b => (b.band || 'morning') === band.key)
        .forEach(b => {
          const cat = (b.category || '').toLowerCase();
          const visible = !VIEW_CATS[currentView] || VIEW_CATS[currentView].includes(cat);
          if (!visible) return;
          totalVisible++;

          const block = document.createElement('div');
          block.className = `block cat-${cat}${b.flexible ? ' flexible' : ''}`;
          if (b.note) block.dataset.note = b.note;

          block.innerHTML =
            (b.time ? `<div class="block-time">${b.time}</div>` : '') +
            `<div class="block-label">${b.label}</div>` +
            (b.who && b.who !== 'all'
              ? `<div class="block-sub">${b.who}</div>` : '');

          cell.appendChild(block);
        });

      bandDays.appendChild(cell);
    });

    bandRow.appendChild(bandDays);
    if (totalVisible === 0) bandRow.classList.add('empty');
    wrap.appendChild(bandRow);
  });
}

function renderStats() {
  const days = scheduleData.days || [];
  let alexEx = 0, triciaEx = 0, walks = 0, cookNights = 0, eatOut = 0;

  days.forEach(day => {
    (day.blocks || []).forEach(b => {
      const cat = (b.category || '').toLowerCase();
      if (cat === 'alex-exercise')   alexEx++;
      if (cat === 'tricia-exercise') triciaEx++;
      if (cat === 'tennis') { alexEx++; triciaEx++; }
      if (cat === 'walk')   walks++;
      if (cat === 'meals' && b.label.toLowerCase().includes('cook')) cookNights++;
      if (cat === 'meals' && b.label.toLowerCase().includes('eat out')) eatOut++;
    });
  });

  const bar = document.getElementById('stats-bar');
  bar.innerHTML = [
    { label: 'Alex workouts',   value: alexEx   + '/wk', sub: 'target 4–5' },
    { label: 'Tricia workouts', value: triciaEx + '/wk', sub: 'yoga + gym + vball + tennis' },
    { label: 'Walks',           value: walks    + '/wk', sub: 'daily goal' },
    { label: 'Cook nights',     value: cookNights,       sub: 'eat-in target' },
    { label: 'Eat out nights',  value: eatOut,           sub: 'planned' },
  ].map(s => `
    <div class="stat">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
      <div class="stat-sub">${s.sub}</div>
    </div>`).join('');
}

// ── TABS ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    renderGrid();
  });
});

// ── BOOT ────────────────────────────────────────────────────────────────────
loadYaml();
</script>
</body>
</html>
